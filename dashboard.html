<!DOCTYPE html>
<html>
<head>
  <title>Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b141a;
      color: white;
    }

    header {
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
    }

    #searchBox {
      padding: 10px;
    }

    input {
      width: 95%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #202c33;
      color: white;
    }

    .chatItem {
      display: flex;
      padding: 12px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #555;
      margin-right: 10px;
    }

    .chatName {
      font-weight: bold;
    }

    #chatScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b141a;
    }

    #chatHeader {
      padding: 15px;
      background: #202c33;
      display: flex;
      justify-content: space-between;
    }

    #messages {
      height: 65%;
      overflow-y: auto;
      padding: 10px;
    }

    .bubble {
      max-width: 70%;
      padding: 8px;
      margin: 5px;
      border-radius: 10px;
    }

    .me {
      background: #005c4b;
      margin-left: auto;
    }

    .other {
      background: #202c33;
      margin-right: auto;
    }

    #inputArea {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: #202c33;
      display: flex;
    }

    #msgInput {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #2a3942;
      color: white;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #00a884;
      color: white;
    }
  </style>
</head>

<body>

<header>Chats</header>

<div id="searchBox">
  <input id="searchInput" placeholder="Search username">
</div>

<div id="chatList"></div>

<!-- CHAT -->
<div id="chatScreen">
  <div id="chatHeader">
    <span id="chatName"></span>
    <button onclick="closeChat()">❌</button>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="Type message">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, collection, addDoc,
  onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega"
});

const db = getFirestore(app);

// ✅ IMPORTANT FIX
const currentUser = localStorage.getItem("username")?.toLowerCase();

let selectedUser = "";
let chatId = "";
let unsub = null;

// 🔍 SEARCH USER
searchInput.oninput = async () => {
  let val = searchInput.value.toLowerCase();

  if (!val) {
    chatList.innerHTML = "";
    return;
  }

  const snap = await getDoc(doc(db, "users", val));

  chatList.innerHTML = "";

  if (snap.exists()) {
    chatList.innerHTML = `
      <div class="chatItem" onclick="openChat('${val}')">
        <div class="avatar"></div>
        <div class="chatName">${val}</div>
      </div>
    `;
  } else {
    chatList.innerHTML = "User not found ❌";
  }
};

// 💬 OPEN CHAT
window.openChat = (user) => {

  selectedUser = user.toLowerCase();

  // 🔥 FIXED CHAT ID (same for both users)
  chatId = [currentUser, selectedUser].sort().join("_");

  console.log("CHAT ID:", chatId);

  chatScreen.style.display = "block";
  chatName.innerText = selectedUser;

  loadMessages();
};

// ❌ CLOSE CHAT
window.closeChat = () => {
  chatScreen.style.display = "none";
  if (unsub) unsub();
};

// 📤 SEND MESSAGE
sendBtn.onclick = async () => {
  const msg = msgInput.value.trim();
  if (!msg) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: msg,
    sender: currentUser,
    time: Date.now()
  });

  msgInput.value = "";
};

// 📥 REALTIME RECEIVE
function loadMessages() {

  if (unsub) unsub();

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("time")
  );

  unsub = onSnapshot(q, (snap) => {
    console.log("Messages:", snap.size);

    messages.innerHTML = "";

    snap.forEach(doc => {
      const m = doc.data();

      messages.innerHTML += `
        <div class="bubble ${m.sender === currentUser ? 'me' : 'other'}">
          ${m.text}
        </div>
      `;
    });

    messages.scrollTop = messages.scrollHeight;
  });
}

</script>

</body>
</html>
