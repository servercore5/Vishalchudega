<!DOCTYPE html>
<html>
<head>
  <title>Chats</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    h2 {
      padding: 15px;
      margin: 0;
      font-size: 28px;
    }

    #searchBox {
      padding: 10px;
    }

    input {
      width: 95%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1f1f1f;
      color: white;
    }

    #chatList {
      margin-top: 10px;
    }

    .chatItem {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #444;
      margin-right: 10px;
    }

    .chatInfo {
      flex: 1;
    }

    .chatName {
      font-weight: bold;
    }

    .chatMsg {
      font-size: 13px;
      color: #aaa;
    }

    .time {
      font-size: 12px;
      color: #aaa;
    }

    /* CHAT SCREEN */
    #chatScreen {
      display: none;
      padding: 10px;
    }

    #messages {
      height: 60vh;
      overflow-y: auto;
      background: #111;
      padding: 10px;
      border-radius: 10px;
    }

    .msg {
      margin: 5px 0;
    }

    .me {
      text-align: right;
      color: #00ff9c;
    }

    .other {
      text-align: left;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #00ff9c;
      color: black;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h2>Chats</h2>

<div id="searchBox">
  <input id="searchInput" placeholder="Search username">
</div>

<div id="chatList"></div>

<!-- 💬 CHAT SCREEN -->
<div id="chatScreen">
  <h3 id="chatWith"></h3>

  <div id="messages"></div>

  <input id="msgInput" placeholder="Type message">
  <button id="sendBtn">Send</button>

  <br>
  <button id="callBtn">📞 Call</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
});

const db = getFirestore(app);

const currentUser = localStorage.getItem("username");

let selectedUser = "";
let chatId = "";
let unsubscribe;

// 🔎 SEARCH LIVE
searchInput.oninput = async () => {
  let username = searchInput.value;

  if (!username) {
    chatList.innerHTML = "";
    return;
  }

  let snap = await getDoc(doc(db, "users", username));

  chatList.innerHTML = "";

  if (snap.exists()) {
    chatList.innerHTML = `
      <div class="chatItem" onclick="openChat('${username}')">
        <div class="avatar"></div>
        <div class="chatInfo">
          <div class="chatName">${username}</div>
          <div class="chatMsg">Tap to chat</div>
        </div>
      </div>
    `;
  } else {
    chatList.innerHTML = "No user found";
  }
};

// 💬 OPEN CHAT
window.openChat = (user) => {

  selectedUser = user;
  chatId = [currentUser, user].sort().join("_");

  chatScreen.style.display = "block";
  chatWith.innerText = "Chat with " + user;

  loadMessages();
};

// 📤 SEND
sendBtn.onclick = async () => {
  let msg = msgInput.value;
  if (!msg) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: msg,
    sender: currentUser,
    time: Date.now()
  });

  msgInput.value = "";
};

// 📥 REALTIME CHAT
function loadMessages() {

  if (unsubscribe) unsubscribe();

  let q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("time")
  );

  unsubscribe = onSnapshot(q, (snap) => {
    messages.innerHTML = "";

    snap.forEach(d => {
      let m = d.data();

      messages.innerHTML += `
        <div class="msg ${m.sender === currentUser ? 'me' : 'other'}">
          ${m.text}
        </div>
      `;
    });

    messages.scrollTop = messages.scrollHeight;
  });
}

// 📞 CALL BUTTON (UI only)
callBtn.onclick = () => {
  alert("Calling UI ready 📞 (next step = real call)");
};

</script>

</body>
</html>
