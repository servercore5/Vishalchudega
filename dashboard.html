<!DOCTYPE html>
<html>
<head>
  <title>Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b141a;
      color: white;
    }

    header {
      padding: 15px;
      font-size: 26px;
      font-weight: bold;
    }

    #searchBox {
      padding: 10px;
    }

    #searchInput {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #202c33;
      color: white;
    }

    .chatList {
      margin-top: 5px;
    }

    .chatItem {
      display: flex;
      padding: 12px;
      align-items: center;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .chatItem:hover {
      background: #202c33;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #555;
      margin-right: 12px;
    }

    .chatContent {
      flex: 1;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
    }

    .msg {
      font-size: 13px;
      color: #8696a0;
    }

    .time {
      font-size: 12px;
      color: #8696a0;
    }

    /* CHAT SCREEN */
    #chatScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b141a;
    }

    #chatHeader {
      padding: 15px;
      background: #202c33;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #messages {
      height: 70%;
      overflow-y: auto;
      padding: 10px;
    }

    .bubble {
      max-width: 70%;
      padding: 8px 12px;
      margin: 5px 0;
      border-radius: 10px;
      font-size: 14px;
    }

    .me {
      background: #005c4b;
      margin-left: auto;
    }

    .other {
      background: #202c33;
      margin-right: auto;
    }

    #inputArea {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: #202c33;
      display: flex;
    }

    #msgInput {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #2a3942;
      color: white;
    }

    #sendBtn {
      margin-left: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #00a884;
      color: white;
    }

    #callBtn {
      background: #00a884;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
    }

  </style>
</head>

<body>

<header>Chats</header>

<div id="searchBox">
  <input id="searchInput" placeholder="Search username">
</div>

<div id="chatList"></div>

<!-- CHAT SCREEN -->
<div id="chatScreen">

  <div id="chatHeader">
    <span id="chatName"></span>
    <button id="callBtn">📞</button>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="Message">
    <button id="sendBtn">➤</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
});

const db = getFirestore(app);

const currentUser = localStorage.getItem("username");

let selectedUser = "";
let chatId = "";
let unsub;

// 🔍 SEARCH
searchInput.oninput = async () => {
  let val = searchInput.value;

  if (!val) {
    chatList.innerHTML = "";
    return;
  }

  let snap = await getDoc(doc(db, "users", val));

  chatList.innerHTML = "";

  if (snap.exists()) {
    chatList.innerHTML = `
      <div class="chatItem" onclick="openChat('${val}')">
        <div class="avatar"></div>
        <div class="chatContent">
          <div class="name">${val}</div>
          <div class="msg">Tap to chat</div>
        </div>
        <div class="time">now</div>
      </div>
    `;
  }
};

// OPEN CHAT
window.openChat = (user) => {

  selectedUser = user;
  chatId = [currentUser, user].sort().join("_");

  chatScreen.style.display = "block";
  chatName.innerText = user;

  loadMessages();
};

// SEND
sendBtn.onclick = async () => {
  let msg = msgInput.value;
  if (!msg) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: msg,
    sender: currentUser,
    time: Date.now()
  });

  msgInput.value = "";
};

// REALTIME CHAT
function loadMessages() {

  if (unsub) unsub();

  let q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("time")
  );

  unsub = onSnapshot(q, snap => {
    messages.innerHTML = "";

    snap.forEach(d => {
      let m = d.data();

      messages.innerHTML += `
        <div class="bubble ${m.sender === currentUser ? 'me' : 'other'}">
          ${m.text}
        </div>
      `;
    });

    messages.scrollTop = messages.scrollHeight;
  });
}

// CALL (placeholder)
callBtn.onclick = () => {
  alert("Call UI next step 🚀");
};

</script>

</body>
</html>
