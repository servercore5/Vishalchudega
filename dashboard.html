<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #0b141a;
      color: white;
    }

    /* HEADER */
    #header {
      display: flex;
      align-items: center;
      padding: 10px;
      background: #202c33;
    }

    #header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin: 0 10px;
    }

    #name {
      font-weight: bold;
    }

    #status {
      font-size: 12px;
      color: #aaa;
    }

    #header-icons {
      margin-left: auto;
    }

    #header-icons span {
      margin: 0 5px;
      cursor: pointer;
    }

    /* CHAT AREA */
    #messages {
      height: 70vh;
      overflow-y: auto;
      padding: 10px;
      background: url('https://i.imgur.com/3e7Jb8k.png');
      background-size: cover;
    }

    .bubble {
      max-width: 70%;
      padding: 8px 10px;
      border-radius: 10px;
      margin: 5px;
      font-size: 14px;
      position: relative;
    }

    .me {
      background: #005c4b;
      margin-left: auto;
    }

    .other {
      background: #202c33;
      margin-right: auto;
    }

    .time {
      font-size: 10px;
      color: #ccc;
      margin-top: 3px;
      text-align: right;
    }

    .ticks {
      font-size: 10px;
      color: #34b7f1;
    }

    /* INPUT */
    #inputArea {
      display: flex;
      padding: 10px;
      background: #202c33;
    }

    #msgInput {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #2a3942;
      color: white;
    }

    button {
      background: none;
      border: none;
      color: #25D366;
      font-size: 18px;
      margin: 0 5px;
    }

    /* ATTACHMENT MENU */
    #attachMenu {
      display: none;
      position: absolute;
      bottom: 70px;
      left: 10px;
      background: #202c33;
      padding: 10px;
      border-radius: 10px;
      width: 250px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      text-align: center;
      font-size: 12px;
    }

    .grid div {
      padding: 10px;
    }

    /* MENU */
    #menu {
      display: none;
      position: absolute;
      top: 50px;
      right: 10px;
      background: #202c33;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    #menu div {
      padding: 5px;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div id="header">
  ←
  <img src="https://randomuser.me/api/portraits/women/44.jpg">
  <div>
    <div id="name">Priya Sharma</div>
    <div id="status">online</div>
  </div>

  <div id="header-icons">
    📹 📞 <span onclick="toggleMenu()">⋮</span>
  </div>
</div>

<!-- MENU -->
<div id="menu">
  <div>View contact</div>
  <div>Search</div>
  <div>Mute</div>
  <div>Clear chat</div>
  <div>Block</div>
</div>

<!-- CHAT -->
<div id="messages"></div>

<!-- ATTACH -->
<div id="attachMenu">
  <div class="grid">
    <div>📄 Document</div>
    <div>📷 Camera</div>
    <div>🖼 Gallery</div>
    <div>🎵 Audio</div>
    <div>📍 Location</div>
    <div>👤 Contact</div>
    <div>📊 Poll</div>
    <div>😊 Sticker</div>
  </div>
</div>

<!-- INPUT -->
<div id="inputArea">
  😊
  <button onclick="toggleAttach()">📎</button>
  📷

  <input id="msgInput" placeholder="Type a message">

  <button id="sendBtn">➤</button>
  🎤
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega"
});

const db = getFirestore(app);

const currentUser = localStorage.getItem("username")?.toLowerCase();
const selectedUser = "testuser"; // demo
const chatId = [currentUser, selectedUser].sort().join("_");

// SEND
sendBtn.onclick = async () => {
  const msg = msgInput.value;
  if (!msg) return;

  await addDoc(collection(db,"chats",chatId,"messages"),{
    text:msg,
    sender:currentUser,
    time:Date.now()
  });

  msgInput.value="";
};

// RECEIVE
const q = query(
  collection(db,"chats",chatId,"messages"),
  orderBy("time")
);

onSnapshot(q,snap=>{
  messages.innerHTML="";

  snap.forEach(d=>{
    let m=d.data();

    messages.innerHTML+=`
      <div class="bubble ${m.sender===currentUser?'me':'other'}">
        ${m.text}
        <div class="time">
          11:35 ✔✔
        </div>
      </div>
    `;
  });

  messages.scrollTop=messages.scrollHeight;
});

// UI
window.toggleAttach=()=>{
  attachMenu.style.display = attachMenu.style.display==="block"?"none":"block";
};

window.toggleMenu=()=>{
  menu.style.display = menu.style.display==="block"?"none":"block";
};

</script>

</body>
</html>
