<!DOCTYPE html>
<html>
<head>
  <title>Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b141a;
      color: white;
    }

    header {
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      background: #202c33;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: #202c33;
      font-size: 14px;
      color: #aaa;
    }

    .active {
      color: #25D366;
      border-bottom: 2px solid #25D366;
    }

    #searchBox {
      padding: 10px;
      background: #202c33;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #2a3942;
      color: white;
    }

    .chatItem {
      display: flex;
      padding: 12px;
      border-bottom: 1px solid #222;
      align-items: center;
      cursor: pointer;
    }

    .chatItem:hover {
      background: #202c33;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #555;
      margin-right: 10px;
      position: relative;
    }

    .online {
      width: 10px;
      height: 10px;
      background: #25D366;
      border-radius: 50%;
      position: absolute;
      bottom: 3px;
      right: 3px;
    }

    .chatContent {
      flex: 1;
    }

    .name {
      font-weight: bold;
    }

    .msg {
      font-size: 13px;
      color: #aaa;
    }

    .right {
      text-align: right;
      font-size: 12px;
      color: #aaa;
    }

    .badge {
      background: #25D366;
      color: black;
      padding: 3px 6px;
      border-radius: 10px;
      font-size: 12px;
      margin-top: 3px;
      display: inline-block;
    }

    /* CHAT SCREEN */
    #chatScreen {
      display: none;
      position: fixed;
      top: 0;
      width: 100%;
      height: 100%;
      background: #0b141a;
    }

    #chatHeader {
      background: #202c33;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #messages {
      height: 70%;
      overflow-y: auto;
      padding: 10px;
    }

    .bubble {
      max-width: 70%;
      padding: 8px 12px;
      border-radius: 10px;
      margin: 5px 0;
      font-size: 14px;
    }

    .me {
      background: #005c4b;
      margin-left: auto;
    }

    .other {
      background: #202c33;
      margin-right: auto;
    }

    #inputArea {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: #202c33;
      display: flex;
    }

    #msgInput {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #2a3942;
      color: white;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #25D366;
      color: black;
    }
  </style>
</head>

<body>

<header>WhatsApp</header>

<div class="tabs">
  <div class="active">Chats</div>
  <div>Status</div>
  <div>Calls</div>
</div>

<div id="searchBox">
  <input id="searchInput" placeholder="Search">
</div>

<div id="chatList"></div>

<!-- CHAT SCREEN -->
<div id="chatScreen">

  <div id="chatHeader">
    <span id="chatName"></span>
    <button onclick="closeChat()">❌</button>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="Type a message">
    <button id="sendBtn">➤</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, collection, addDoc,
  onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega"
});

const db = getFirestore(app);

const currentUser = localStorage.getItem("username")?.toLowerCase();

let selectedUser = "";
let chatId = "";
let unsub;

// 🔍 SEARCH
searchInput.oninput = async () => {
  let val = searchInput.value.toLowerCase();

  if (!val) {
    chatList.innerHTML = "";
    return;
  }

  const snap = await getDoc(doc(db, "users", val));

  chatList.innerHTML = "";

  if (snap.exists()) {
    chatList.innerHTML = `
      <div class="chatItem" onclick="openChat('${val}')">
        <div class="avatar"><div class="online"></div></div>
        <div class="chatContent">
          <div class="name">${val}</div>
          <div class="msg">Tap to chat</div>
        </div>
        <div class="right">
          now<br><span class="badge">1</span>
        </div>
      </div>
    `;
  }
};

// 💬 OPEN CHAT
window.openChat = (user) => {

  selectedUser = user.toLowerCase();
  chatId = [currentUser, selectedUser].sort().join("_");

  chatScreen.style.display = "block";
  chatName.innerText = user;

  loadMessages();
};

// ❌ CLOSE
window.closeChat = () => {
  chatScreen.style.display = "none";
  if (unsub) unsub();
};

// 📤 SEND
sendBtn.onclick = async () => {
  let msg = msgInput.value;
  if (!msg) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: msg,
    sender: currentUser,
    time: Date.now()
  });

  msgInput.value = "";
};

// 📥 REALTIME
function loadMessages() {

  if (unsub) unsub();

  let q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("time")
  );

  unsub = onSnapshot(q, snap => {
    messages.innerHTML = "";

    snap.forEach(d => {
      let m = d.data();

      messages.innerHTML += `
        <div class="bubble ${m.sender === currentUser ? 'me' : 'other'}">
          ${m.text}
        </div>
      `;
    });

    messages.scrollTop = messages.scrollHeight;
  });
}

</script>

</body>
</html>
