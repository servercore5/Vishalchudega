<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Welcome, <span id="userDisplay"></span> 👋</h2>

<hr>

<!-- 🎤 MIC ENABLE -->
<button id="enableMicBtn">Enable Microphone 🎤</button>
<p id="micStatus"></p>

<hr>

<h3>Search User</h3>
<input id="searchInput" placeholder="Enter username"><br><br>
<button id="searchBtn">Search</button>

<p id="result"></p>
<button id="startChatBtn" style="display:none;">Start Chat</button>

<!-- 🔥 CALL BUTTONS -->
<button id="callBtn" style="display:none;">Call 📞</button>
<button id="answerBtn" style="display:none;">Answer 📞</button>

<div id="chatBox" style="display:none; margin-top:20px;">
  <h3>Chat</h3>
  <div id="messages" style="border:1px solid black; height:200px; overflow:auto;"></div><br>
  <input id="msgInput" placeholder="Type message">
  <button id="sendBtn">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy,
  setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 current user
const currentUser = localStorage.getItem("username");
document.getElementById("userDisplay").innerText = currentUser;

let selectedUser = "";
let chatId = "";
let micAllowed = false;

// 🎤 MIC BUTTON
document.getElementById("enableMicBtn").addEventListener("click", async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    micAllowed = true;
    document.getElementById("micStatus").innerText = "Microphone Allowed ✅";

    stream.getTracks().forEach(track => track.stop());

  } catch (err) {
    document.getElementById("micStatus").innerText = "Mic Denied ❌";
  }
});

// 🔥 CALL VARIABLES
let pc = new RTCPeerConnection({
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});
let localStream;

// 🔍 SEARCH
document.getElementById("searchBtn").addEventListener("click", async () => {
  const username = document.getElementById("searchInput").value;

  const userRef = doc(db, "users", username);
  const userSnap = await getDoc(userRef);

  if (userSnap.exists()) {
    document.getElementById("result").innerText = "User Found ✅";
    document.getElementById("startChatBtn").style.display = "block";
    document.getElementById("callBtn").style.display = "block";
    selectedUser = username;
  } else {
    document.getElementById("result").innerText = "User Not Found ❌";
  }
});

// 💬 START CHAT
document.getElementById("startChatBtn").addEventListener("click", () => {
  document.getElementById("chatBox").style.display = "block";
  chatId = [currentUser, selectedUser].sort().join("_");
  loadMessages();
});

// 📤 SEND
document.getElementById("sendBtn").addEventListener("click", async () => {
  const msg = document.getElementById("msgInput").value;
  if (!msg) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: msg,
    sender: currentUser,
    time: Date.now()
  });

  document.getElementById("msgInput").value = "";
});

// 📥 REALTIME
function loadMessages() {
  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("time")
  );

  onSnapshot(q, (snapshot) => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();
      box.innerHTML += `<p><b>${data.sender}:</b> ${data.text}</p>`;
    });

    box.scrollTop = box.scrollHeight;
  });
}

// 📞 CALL START
document.getElementById("callBtn").addEventListener("click", async () => {
  try {

    if (!micAllowed) {
      alert("Pehle mic allow kar bhai 🎤");
      return;
    }

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await setDoc(doc(db, "calls", selectedUser), {
      offer: offer,
      from: currentUser
    });

    alert("Calling... 📞");

  } catch (err) {
    alert(err.message);
  }
});

// 📞 RECEIVE CALL
onSnapshot(doc(db, "calls", currentUser), async (snapshot) => {
  const data = snapshot.data();

  if (data?.offer) {
    document.getElementById("answerBtn").style.display = "block";
    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
  }

  if (data?.answer) {
    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
  }
});

// 📞 ANSWER
document.getElementById("answerBtn").addEventListener("click", async () => {
  try {

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    await updateDoc(doc(db, "calls", currentUser), {
      answer: answer
    });

    alert("Call Connected 🎤");

  } catch (err) {
    alert(err.message);
  }
});

</script>

</body>
</html>
