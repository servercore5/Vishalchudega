<!DOCTYPE html>
<html>
<head>
  <title>Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#0b141a; color:white; font-family:sans-serif;">

<h2 style="padding:15px;">Chats</h2>

<div id="chatList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("username");

async function loadUsers() {
  const querySnapshot = await getDocs(collection(db, "users"));

  const list = document.getElementById("chatList");
  list.innerHTML = "";

  querySnapshot.forEach(doc => {
    const username = doc.id;

    if (username === currentUser) return;

    list.innerHTML += `
      <div onclick="openChat('${username}')" 
      style="padding:15px;border-bottom:1px solid #222;cursor:pointer;">
        ${username}
      </div>
    `;
  });
}

window.openChat = function(user){
  localStorage.setItem("chatUser", user);
  window.location.href = "chat.html";
}

loadUsers();

</script>

</body>
</html>
