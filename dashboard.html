<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Welcome, <span id="userDisplay"></span> 👋</h2>

<!-- 🎤 MIC -->
<button id="enableMicBtn">Enable Microphone 🎤</button>
<p id="micStatus"></p>

<hr>

<!-- 🔎 SEARCH -->
<h3>Search User</h3>
<input id="searchInput" placeholder="Enter username">
<button id="searchBtn">Search</button>

<ul id="userList"></ul>

<hr>

<!-- 💬 CHAT THREAD -->
<div id="chatSection" style="display:none;">
  <h3 id="chatWith"></h3>

  <div id="messages" style="border:1px solid black;height:200px;overflow:auto;"></div>

  <input id="msgInput">
  <button id="sendBtn">Send</button>

  <br><br>

  <!-- 📞 CALL -->
  <button id="callBtn">Call 📞</button>
</div>

<!-- 📞 POPUP -->
<div id="callPopup" style="display:none;border:2px solid black;padding:10px;">
  <h3 id="callStatus">Calling...</h3>

  <button id="acceptBtn">Accept</button>
  <button id="rejectBtn">Reject</button>

  <br><br>

  <button id="muteBtn">Mute</button>
  <button id="speakerBtn">Speaker</button>
  <button id="holdBtn">Hold</button>
  <button id="endBtn">End</button>
</div>

<audio id="ringtone" loop src="https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy,
  setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
});
const db = getFirestore(app);

const currentUser = localStorage.getItem("username");
document.getElementById("userDisplay").innerText = currentUser;

let selectedUser = "";
let chatId = "";
let unsubscribe = null;
let micAllowed = false;

// 🎤 MIC
enableMicBtn.onclick = async () => {
  try {
    let s = await navigator.mediaDevices.getUserMedia({audio:true});
    micAllowed = true;
    micStatus.innerText="Mic Allowed";
    s.getTracks().forEach(t=>t.stop());
  } catch {
    alert("Mic allow karo");
  }
};

// 🔎 SEARCH
searchBtn.onclick = async () => {
  let u = searchInput.value;
  let snap = await getDoc(doc(db,"users",u));

  userList.innerHTML="";

  if(snap.exists()){
    let li = document.createElement("li");
    li.innerText = u;
    li.onclick = ()=>openChat(u);
    userList.appendChild(li);
  } else {
    userList.innerText="User not found";
  }
};

// 💬 OPEN CHAT THREAD
function openChat(user){
  selectedUser = user;
  chatId = [currentUser, user].sort().join("_");

  chatSection.style.display="block";
  chatWith.innerText="Chat with "+user;

  loadMessages();
}

// 💬 SEND
sendBtn.onclick = async ()=>{
  let msg = msgInput.value;
  if(!msg) return;

  await addDoc(collection(db,"chats",chatId,"messages"),{
    text:msg,
    sender:currentUser,
    time:Date.now()
  });

  msgInput.value="";
};

// 💬 LOAD (stable realtime)
function loadMessages(){
  if(unsubscribe) unsubscribe();

  let q = query(
    collection(db,"chats",chatId,"messages"),
    orderBy("time")
  );

  unsubscribe = onSnapshot(q,(snap)=>{
    messages.innerHTML="";
    snap.forEach(d=>{
      let data = d.data();
      messages.innerHTML += `<p><b>${data.sender}:</b> ${data.text}</p>`;
    });
  });
}

// ===================
// 📞 CALL SYSTEM (UI + SIGNALING)
// ===================

callBtn.onclick = async ()=>{
  if(!micAllowed) return alert("Mic allow kar");

  callPopup.style.display="block";
  callStatus.innerText="Calling...";

  await setDoc(doc(db,"calls",selectedUser),{
    from:currentUser,
    type:"offer"
  });
};

// 🔔 RECEIVE
onSnapshot(doc(db,"calls",currentUser),(snap)=>{
  let data = snap.data();
  if(!data) return;

  callPopup.style.display="block";

  // अगर user chat open है → ringing
  if(selectedUser === data.from){
    callStatus.innerText="Ringing...";
  } else {
    callStatus.innerText="Incoming Call...";
  }

  ringtone.play();
});

// ✅ ACCEPT
acceptBtn.onclick = async ()=>{
  ringtone.pause();

  callStatus.innerText="Connected 🎤";

  await updateDoc(doc(db,"calls",selectedUser),{
    type:"answer"
  });
};

// ❌ REJECT
rejectBtn.onclick = ()=>{
  ringtone.pause();
  callPopup.style.display="none";
};

// 🔇 MUTE
muteBtn.onclick = ()=>{
  alert("Muted 🔇");
};

// 🔊 SPEAKER
speakerBtn.onclick = ()=>{
  alert("Speaker 🔊");
};

// ⏸ HOLD
holdBtn.onclick = ()=>{
  alert("On Hold ⏸");
};

// 📞 END
endBtn.onclick = ()=>{
  callPopup.style.display="none";
  ringtone.pause();
};

</script>
</body>
</html>
