<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Welcome, <span id="userDisplay"></span> 👋</h2>

<button id="enableMicBtn">Enable Microphone 🎤</button>
<p id="micStatus"></p>

<hr>

<h3>Search User</h3>
<input id="searchInput" placeholder="Enter username"><br><br>
<button id="searchBtn">Search</button>

<p id="result"></p>

<button id="callBtn" style="display:none;">Call 📞</button>

<!-- 📞 CALL SCREEN -->
<div id="callScreen" style="display:none; border:2px solid black; padding:10px;">
  <h3 id="callStatus">Incoming Call...</h3>

  <button id="acceptBtn">Accept ✅</button>
  <button id="rejectBtn">Reject ❌</button>

  <br><br>

  <button id="muteBtn">Mute 🔇</button>
  <button id="speakerBtn">Speaker 🔊</button>
</div>

<audio id="ringtone" loop src="https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("username");
document.getElementById("userDisplay").innerText = currentUser;

let selectedUser = "";
let pc;
let localStream;
let micAllowed = false;

const ringtone = document.getElementById("ringtone");

// 🎤 MIC
document.getElementById("enableMicBtn").onclick = async () => {
  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
    micAllowed = true;
    document.getElementById("micStatus").innerText = "Mic Allowed ✅";
    s.getTracks().forEach(t => t.stop());
  } catch {
    alert("Mic allow kar bhai");
  }
};

// 🔍 SEARCH
document.getElementById("searchBtn").onclick = async () => {
  selectedUser = document.getElementById("searchInput").value;
  document.getElementById("callBtn").style.display = "block";
  document.getElementById("result").innerText = "User Ready 📞";
};

// 📞 CREATE PEER
function createPeer() {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  pc.onicecandidate = async (e) => {
    if (e.candidate) {
      await updateDoc(doc(db, "calls", selectedUser), {
        candidate: JSON.stringify(e.candidate)
      });
    }
  };
}

// 📞 CALL
document.getElementById("callBtn").onclick = async () => {
  if (!micAllowed) return alert("Mic allow karo");

  createPeer();

  localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await setDoc(doc(db, "calls", selectedUser), {
    offer,
    from: currentUser
  });

  document.getElementById("callScreen").style.display = "block";
  document.getElementById("callStatus").innerText = "Calling...";
};

// 📞 RECEIVE
onSnapshot(doc(db, "calls", currentUser), async (snap) => {
  const data = snap.data();

  if (!data) return;

  if (data.offer) {
    ringtone.play();

    document.getElementById("callScreen").style.display = "block";
    document.getElementById("callStatus").innerText = "Incoming Call 📞";
  }

  if (data.answer && pc) {
    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
  }

  if (data.candidate && pc) {
    const c = new RTCIceCandidate(JSON.parse(data.candidate));
    await pc.addIceCandidate(c);
  }
});

// 📞 ACCEPT
document.getElementById("acceptBtn").onclick = async () => {
  ringtone.pause();

  createPeer();

  localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  const callDoc = doc(db, "calls", currentUser);
  const data = (await (await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js")).getDoc(callDoc)).data();

  await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await updateDoc(callDoc, { answer });

  document.getElementById("callStatus").innerText = "Connected 🎤";
};

// ❌ REJECT
document.getElementById("rejectBtn").onclick = () => {
  ringtone.pause();
  document.getElementById("callScreen").style.display = "none";
};

// 🔇 MUTE
document.getElementById("muteBtn").onclick = () => {
  localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
};

// 🔊 SPEAKER (basic toggle)
document.getElementById("speakerBtn").onclick = () => {
  alert("Speaker toggle depends on device 🔊");
};

</script>

</body>
</html>
