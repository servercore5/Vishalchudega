<!DOCTYPE html>
<html>
<head>
  <title>Calling App</title>
</head>
<body>

<h2>Login / Signup</h2>

<input id="username" placeholder="Username"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, setDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
  storageBucket: "vishalchudega.firebasestorage.app",
  messagingSenderId: "783386455269",
  appId: "1:783386455269:web:4b3ec213a3f4cb6972f80c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SIGNUP
document.getElementById("signupBtn").addEventListener("click", async () => {
  try {
    const emailVal = document.getElementById("email").value;
    const passVal = document.getElementById("password").value;
    const username = document.getElementById("username").value;

    if (!emailVal || !passVal || !username) {
      alert("Saare fields bhar bhai 😄");
      return;
    }

    const userCred = await createUserWithEmailAndPassword(auth, emailVal, passVal);

    // Firestore save
    await setDoc(doc(db, "users", username), {
      email: emailVal,
      uid: userCred.user.uid,
      online: true
    });

    alert("Signup + Firestore save ✅");

  } catch (err) {
    alert(err.message);
  }
});

// LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {
  try {
    const emailVal = document.getElementById("email").value;
    const passVal = document.getElementById("password").value;

    if (!emailVal || !passVal) {
      alert("Email/password daal pehle 😄");
      return;
    }

    await signInWithEmailAndPassword(auth, emailVal, passVal);

    alert("Login success ✅");

  } catch (err) {
    alert(err.message);
  }
});

</script>

</body>
</html>
