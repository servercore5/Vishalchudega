<!DOCTYPE html>
<html>
<head>
  <title>Calling App</title>
</head>
<body>

<h2>Login / Signup</h2>

<input id="username" placeholder="Username"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>

<script type="module">

// 🔥 Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 Firestore imports (NEW)
import { getFirestore, setDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase config (same)
const firebaseConfig = {
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  databaseURL: "https://vishalchudega-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vishalchudega",
  storageBucket: "vishalchudega.firebasestorage.app",
  messagingSenderId: "783386455269",
  appId: "1:783386455269:web:4b3ec213a3f4cb6972f80c"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app); // 🔥 NEW

// ✅ SIGNUP (UPDATED)
document.getElementById("signupBtn").addEventListener("click", async () => {
  try {
    const username = document.getElementById("username").value;

    if (!username) {
      alert("Username daal bhai 😄");
      return;
    }

    const userCred = await createUserWithEmailAndPassword(auth, email.value, password.value);

    // 🔥 Firestore में save
    await setDoc(doc(db, "users", username), {
      email: email.value,
      uid: userCred.user.uid,
      online: true
    });

    alert("Signup + Firestore save ✅");

  } catch (err) {
    alert(err.message);
  }
});

// ✅ LOGIN (same)
document.getElementById("loginBtn").addEventListener("click", async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    alert("Login success ✅");
  } catch (err) {
    alert(err.message);
  }
});

</script>

</body>
</html>
