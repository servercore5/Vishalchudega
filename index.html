<!DOCTYPE html>
<html>
<head>
  <title>Encrypted Communication</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #cfe9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 350px;
      text-align: center;
    }

    img {
      width: 80px;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 20px;
      color: black;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: white;
      color: black;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-weight: bold;
    }

    .link {
      margin-top: 10px;
      color: blue;
      cursor: pointer;
      font-size: 14px;
    }

    /* Popup */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 350px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); }
      to { transform: scale(1); }
    }

    .eye {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }

    .password-box {
      position: relative;
    }

  </style>
</head>

<body>

<div class="container">

  <img src="logopagal.png">
  <h2>Encrypted Communication</h2>

  <input id="username" placeholder="Username">
  
  <div class="password-box">
    <input id="password" type="password" placeholder="Password">
    <span class="eye" onclick="togglePassword()">👁️</span>
  </div>

  <button id="loginBtn">Login</button>

  <div class="link">Forgot Password</div>
  <div class="link" onclick="openPopup()">Sign Up</div>

</div>

<!-- SIGNUP POPUP -->
<div class="popup" id="popup">

  <div class="popup-content">

    <h3>Create Account</h3>

    <input id="name" placeholder="Name">
    <input id="newUsername" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="newPassword" type="password" placeholder="Password">
    <input id="confirmPassword" type="password" placeholder="Confirm Password">

    <button onclick="signup()">Create Account</button>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, setDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {

  const username = document.getElementById("username").value.toLowerCase();
  const password = document.getElementById("password").value;

  if (!username || !password) {
    alert("Fill all fields");
    return;
  }

  try {

    // 🔥 username → email mapping
    const email = username + "@app.com";

    await signInWithEmailAndPassword(auth, email, password);

    localStorage.setItem("username", username);

    window.location.href = "dashboard.html";

  } catch (err) {
    alert("Invalid username or password ❌");
  }
});

// 📝 SIGNUP
window.signup = async () => {

  const name = document.getElementById("name").value;
  const username = document.getElementById("newUsername").value.toLowerCase();
  const email = document.getElementById("email").value;
  const pass = document.getElementById("newPassword").value;
  const confirm = document.getElementById("confirmPassword").value;

  if (!name || !username || !email || !pass || !confirm) {
    alert("All fields required");
    return;
  }

  if (pass !== confirm) {
    alert("Passwords do not match");
    return;
  }

  try {

    // 🔥 fake email for login mapping
    const fakeEmail = username + "@app.com";

    const user = await createUserWithEmailAndPassword(auth, fakeEmail, pass);

    await setDoc(doc(db, "users", username), {
      name,
      email,
      uid: user.user.uid
    });

    alert("Account created successfully ✅");

    popup.style.display = "none";

  } catch (err) {
    alert(err.message);
  }
};

// 👁️ PASSWORD TOGGLE
window.togglePassword = () => {
  const pass = document.getElementById("password");

  pass.type = pass.type === "password" ? "text" : "password";
};

// POPUP
window.openPopup = () => popup.style.display = "flex";

</script>

</body>
</html>
