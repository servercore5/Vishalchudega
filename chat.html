<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#d6ecff;font-family:sans-serif;">

<!-- HEADER -->
<div style="display:flex;align-items:center;padding:10px;background:white;">
  <button onclick="goBack()">⬅</button>
  <h3 id="userName" style="margin-left:10px;"></h3>
  <button id="callBtn" style="margin-left:auto;">📞</button>
</div>

<!-- MESSAGES -->
<div id="messages" style="height:65vh;overflow:auto;padding:10px;"></div>

<!-- INPUT -->
<div style="display:flex;padding:10px;background:white;">
  <input id="msgInput" placeholder="Type message"
  style="flex:0.8;padding:10px;border-radius:10px;border:1px solid gray;">
  <button id="sendBtn" style="margin-left:5px;">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, query, orderBy,
  doc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("username");
const selectedUser = localStorage.getItem("chatUser");

document.getElementById("userName").innerText = selectedUser;

const chatId = [currentUser,selectedUser].sort().join("_");

// ================== MESSAGE ==================

// SEND
document.getElementById("sendBtn").addEventListener("click", async ()=>{
  const msg = document.getElementById("msgInput").value;
  if(!msg) return;

  await addDoc(collection(db,"chats",chatId,"messages"),{
    text:msg,
    sender:currentUser,
    status:"sent",
    time:Date.now()
  });

  document.getElementById("msgInput").value="";
});

// REALTIME
const q = query(collection(db,"chats",chatId,"messages"),orderBy("time"));

onSnapshot(q,(snap)=>{
  const box = document.getElementById("messages");
  box.innerHTML="";

  snap.forEach(d=>{
    const data = d.data();

    let tick = "✔";
    if(data.status==="delivered") tick="✔✔";
    if(data.status==="read") tick="✔✔";

    box.innerHTML += `
      <div style="display:flex;flex-direction:column;
      align-items:${data.sender===currentUser?"flex-end":"flex-start"};
      margin:8px;">

        <div style="
          background:${data.sender===currentUser?"#25D366":"white"};
          color:${data.sender===currentUser?"white":"black"};
          padding:10px;
          border-radius:12px;
          max-width:70%;
          word-wrap:break-word;
        ">
          ${data.text}
        </div>

        <div style="font-size:11px;color:gray;margin-top:2px;">
          ${tick}
        </div>

      </div>
    `;
  });

  box.scrollTop = box.scrollHeight;
});

// ================== CALL SYSTEM ==================

let pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let localStream;

// CALL START
document.getElementById("callBtn").addEventListener("click", async ()=>{

  localStream = await navigator.mediaDevices.getUserMedia({audio:true});

  localStream.getTracks().forEach(track=>{
    pc.addTrack(track,localStream);
  });

  // ICE SEND
  pc.onicecandidate = async (event)=>{
    if(event.candidate){
      await setDoc(doc(db,"calls",selectedUser+"_ice"),{
        candidate:event.candidate
      });
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await setDoc(doc(db,"calls",selectedUser),{
    offer:offer,
    from:currentUser
  });

  alert("Calling...");
});

// RECEIVE
onSnapshot(doc(db,"calls",currentUser), async (snap)=>{
  const data = snap.data();

  if(data?.offer){

    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    localStream.getTracks().forEach(track=>{
      pc.addTrack(track,localStream);
    });

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    await updateDoc(doc(db,"calls",currentUser),{
      answer:answer
    });

    alert("Incoming call 🎤 Connected");
  }

  if(data?.answer){
    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
  }
});

// ==================

window.goBack=()=>window.location.href="dashboard.html";

</script>

</body>
</html>
