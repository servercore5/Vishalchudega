<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#0b141a; color:white; font-family:sans-serif;">

<!-- HEADER -->
<div style="display:flex;align-items:center;padding:10px;background:#202c33;">
  <button onclick="goBack()">⬅</button>
  <h3 id="userName" style="margin-left:10px;"></h3>

  <div style="margin-left:auto;">
    <button id="callBtn">📞</button>
  </div>
</div>

<!-- MESSAGES -->
<div id="messages" style="height:70vh;overflow:auto;padding:10px;"></div>

<!-- INPUT -->
<div style="display:flex;padding:10px;">
  <input id="msgInput" style="flex:1;padding:10px;">
  <button id="sendBtn">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, query, orderBy,
  doc, setDoc, updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("username");
const selectedUser = localStorage.getItem("chatUser");

document.getElementById("userName").innerText = selectedUser;

const chatId = [currentUser, selectedUser].sort().join("_");

// SEND MESSAGE
document.getElementById("sendBtn").addEventListener("click", async () => {
  const msg = document.getElementById("msgInput").value;
  if(!msg) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: msg,
    sender: currentUser,
    time: Date.now()
  });

  document.getElementById("msgInput").value="";
});

// REALTIME CHAT
const q = query(collection(db, "chats", chatId, "messages"), orderBy("time"));

onSnapshot(q, (snap) => {
  const box = document.getElementById("messages");
  box.innerHTML="";

  snap.forEach(d=>{
    const data = d.data();

    const align = data.sender === currentUser ? "right" : "left";
    const color = data.sender === currentUser ? "#005c4b" : "#202c33";

    box.innerHTML += `
      <div style="text-align:${align};margin:5px;">
        <span style="background:${color};padding:10px;border-radius:10px;">
          ${data.text}
        </span>
      </div>
    `;
  });

  box.scrollTop = box.scrollHeight;
});

// 📞 CALL SYSTEM (BASIC WORKING)
let pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

document.getElementById("callBtn").addEventListener("click", async ()=>{

  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  stream.getTracks().forEach(t=>pc.addTrack(t,stream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await setDoc(doc(db,"calls",selectedUser),{
    offer:offer,
    from:currentUser
  });

  alert("Calling...");
});

// RECEIVE
onSnapshot(doc(db,"calls",currentUser), async (snap)=>{
  const data = snap.data();

  if(data?.offer){
    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>pc.addTrack(t,stream));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    await updateDoc(doc(db,"calls",currentUser),{
      answer:answer
    });

    alert("Call connected 🎤");
  }

  if(data?.answer){
    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
  }
});

window.goBack = ()=>window.location.href="dashboard.html";

</script>

</body>
</html>
