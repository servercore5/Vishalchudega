<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{margin:0;font-family:sans-serif;background:#cfe3f3;}

    .header{
      background:white;
      padding:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .chatBox{
      height:70vh;
      overflow:auto;
      padding:10px;
    }

    .msg{
      max-width:70%;
      padding:10px;
      margin:6px;
      border-radius:10px;
      word-wrap:break-word;
    }

    .sent{background:#25D366;color:white;margin-left:auto;}
    .received{background:white;margin-right:auto;}

    .time{
      font-size:10px;
      display:block;
      text-align:right;
      margin-top:5px;
    }

    .inputBox{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      gap:8px;
      background:white;
      padding:8px;
    }

    .inputBox input{
      flex:0.8;
      padding:10px;
      border-radius:20px;
      border:1px solid gray;
    }

    .inputBox button{
      flex:0.2;
      padding:10px;
      background:#25D366;
      color:white;
      border:none;
      border-radius:20px;
    }

    #callScreen{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      color:white;
      z-index:9999;
      text-align:center;
    }

    .callControls{
      position:absolute;
      bottom:40px;
      width:100%;
      display:flex;
      justify-content:space-evenly;
    }

    .callControls button{
      padding:15px;
      border-radius:50%;
      border:none;
    }

    .end{background:red;color:white;}
  </style>
</head>

<body>

<div class="header">
  <button onclick="goBack()">⬅</button>
  <span id="chatUser"></span>
  <button id="callBtn">📞</button>
</div>

<div id="messages" class="chatBox"></div>

<div class="inputBox">
  <input id="msgInput" placeholder="Type message">
  <button id="sendBtn">Send</button>
</div>

<!-- CALL UI -->
<div id="callScreen">
  <button onclick="goToChat()" style="position:absolute;top:10px;left:10px;background:none;color:white;border:none;">
    ⬅ Go to Chats
  </button>

  <h2 id="callUserName"></h2>
  <p id="callStatus">Calling...</p>

  <div style="width:150px;height:150px;border-radius:50%;background:#444;margin:40px auto;display:flex;align-items:center;justify-content:center;font-size:40px;">
    👤
  </div>

  <div class="callControls">
    <button id="speakerBtn">🔊</button>
    <button id="muteBtn">🎤</button>
    <button class="end" onclick="endCall()">📞</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, query, orderBy,
  doc, setDoc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("username");
const selectedUser = new URLSearchParams(window.location.search).get("user");

document.getElementById("chatUser").innerText = selectedUser;

const chatId = [currentUser, selectedUser].sort().join("_");


// 🔥 CHAT LOAD
onSnapshot(query(collection(db,"chats",chatId,"messages"), orderBy("time")), snap=>{
  const box = document.getElementById("messages");
  box.innerHTML="";

  snap.forEach(doc=>{
    const d = doc.data();

    const div = document.createElement("div");
    div.className = "msg " + (d.sender === currentUser ? "sent":"received");

    div.innerHTML = `
      ${d.text}
      <span class="time">${new Date(d.time).toLocaleTimeString()}</span>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});


// SEND
document.getElementById("sendBtn").onclick = async ()=>{
  const msg = document.getElementById("msgInput").value;
  if(!msg) return;

  await addDoc(collection(db,"chats",chatId,"messages"),{
    text:msg,
    sender:currentUser,
    time:Date.now()
  });

  document.getElementById("msgInput").value="";
};


// ==================
// CALL SYSTEM FIXED
// ==================

let pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let localStream;
let remoteAudio = document.createElement("audio");
remoteAudio.autoplay = true;

pc.ontrack = (e)=>{
  remoteAudio.srcObject = e.streams[0];
};

let callDocRef;
let localCandidates;
let remoteCandidates;

const callScreen = document.getElementById("callScreen");

function showCallUI(user){
  callScreen.style.display="block";
  document.getElementById("callUserName").innerText=user;
}

function goToChat(){
  callScreen.style.display="none";
}

function endCall(){
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  pc.close();
  callScreen.style.display="none";
}


// CALL START
document.getElementById("callBtn").onclick = async ()=>{

  showCallUI(selectedUser);

  localStream = await navigator.mediaDevices.getUserMedia({audio:true});

  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  callDocRef = doc(db,"calls",chatId);

  localCandidates = collection(callDocRef,"offerCandidates");
  remoteCandidates = collection(callDocRef,"answerCandidates");

  pc.onicecandidate = async (e)=>{
    if(e.candidate){
      await addDoc(localCandidates, e.candidate.toJSON());
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await setDoc(callDocRef,{
    offer:offer,
    from:currentUser,
    to:selectedUser
  });

  onSnapshot(callDocRef, async snap=>{
    const data = snap.data();
    if(data?.answer && !pc.currentRemoteDescription){
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      document.getElementById("callStatus").innerText="Connected 🎤";
    }
  });

  onSnapshot(remoteCandidates, snap=>{
    snap.docChanges().forEach(c=>{
      if(c.type==="added"){
        pc.addIceCandidate(new RTCIceCandidate(c.doc.data()));
      }
    });
  });
};


// RECEIVE CALL
onSnapshot(doc(db,"calls",chatId), async snap=>{
  const data = snap.data();

  if(data?.offer && data.to === currentUser){

    showCallUI(data.from);
    document.getElementById("callStatus").innerText="Incoming...";

    localStream = await navigator.mediaDevices.getUserMedia({audio:true});

    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    localCandidates = collection(doc(db,"calls",chatId),"answerCandidates");
    remoteCandidates = collection(doc(db,"calls",chatId),"offerCandidates");

    await updateDoc(doc(db,"calls",chatId),{answer:answer});

    onSnapshot(remoteCandidates, snap=>{
      snap.docChanges().forEach(c=>{
        if(c.type==="added"){
          pc.addIceCandidate(new RTCIceCandidate(c.doc.data()));
        }
      });
    });

    document.getElementById("callStatus").innerText="Connected 🎤";
  }
});


// MUTE
let isMuted=false;
document.getElementById("muteBtn").onclick=()=>{
  if(!localStream) return;
  isMuted=!isMuted;

  localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);

  document.getElementById("muteBtn").innerText=isMuted?"🔇":"🎤";
};


// SPEAKER (UI only)
document.getElementById("speakerBtn").onclick=()=>{
  alert("Speaker toggle (browser limitation)");
};


function goBack(){
  window.location.href="dashboard.html";
}

</script>

</body>
</html>
