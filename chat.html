<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#cfe3f3;
    }

    /* HEADER */
    .header{
      background:white;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-weight:bold;
    }

    .chatBox{
      height:75vh;
      overflow:auto;
      padding:10px;
    }

    .msg{
      max-width:70%;
      padding:10px;
      margin:6px;
      border-radius:10px;
      position:relative;
      word-wrap:break-word;
    }

    .sent{
      background:#25D366;
      color:white;
      margin-left:auto;
    }

    .received{
      background:white;
      margin-right:auto;
    }

    .time{
      font-size:10px;
      display:block;
      margin-top:5px;
      text-align:right;
    }

    .inputBox{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      background:white;
      padding:10px;
    }

    .inputBox input{
      flex:1;
      padding:10px;
      border-radius:20px;
      border:1px solid gray;
    }

    .inputBox button{
      margin-left:10px;
      padding:10px 15px;
      background:#25D366;
      color:white;
      border:none;
      border-radius:20px;
    }

    /* 📞 CALL SCREEN */
    #callScreen{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      color:white;
      z-index:9999;
      text-align:center;
    }

    #callScreen h2{
      margin-top:40px;
    }

    .callControls{
      position:absolute;
      bottom:40px;
      width:100%;
      display:flex;
      justify-content:space-evenly;
    }

    .callControls button{
      padding:15px;
      border-radius:50%;
      border:none;
      font-size:18px;
    }

    .end{
      background:red;
      color:white;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <button onclick="goBack()">⬅</button>
  <span id="chatUser"></span>
  <button id="callBtn">📞</button>
</div>

<!-- CHAT -->
<div id="messages" class="chatBox"></div>

<!-- INPUT -->
<div class="inputBox">
  <input id="msgInput" placeholder="Type message">
  <button id="sendBtn">Send</button>
</div>

<!-- 📞 CALL UI -->
<div id="callScreen">
  <button onclick="goToChat()" style="position:absolute;top:10px;left:10px;background:none;color:white;border:none;">
    ⬅ Go to Chats
  </button>

  <h2 id="callUserName"></h2>
  <p id="callStatus">Calling...</p>

  <div style="width:150px;height:150px;border-radius:50%;background:#444;margin:40px auto;display:flex;align-items:center;justify-content:center;font-size:40px;">
    👤
  </div>

  <div class="callControls">
    <button>⋯</button>
    <button>📹</button>
    <button>🔊</button>
    <button>🎤</button>
    <button class="end" onclick="endCall()">📞</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY79w4aFGPxndBqLf2-TEvJ-bKjBLYY_c",
  authDomain: "vishalchudega.firebaseapp.com",
  projectId: "vishalchudega"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// USERS
const currentUser = localStorage.getItem("username");
const selectedUser = new URLSearchParams(window.location.search).get("user");

document.getElementById("chatUser").innerText = selectedUser;

const chatId = [currentUser, selectedUser].sort().join("_");

// 📩 LOAD MESSAGES
const q = query(collection(db,"chats",chatId,"messages"), orderBy("time"));

onSnapshot(q, snapshot => {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  snapshot.forEach(doc=>{
    const data = doc.data();

    const div = document.createElement("div");
    div.className = "msg " + (data.sender === currentUser ? "sent":"received");

    div.innerHTML = `
      ${data.text}
      <span class="time">${new Date(data.time).toLocaleTimeString()}</span>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});

// 📤 SEND
document.getElementById("sendBtn").onclick = async ()=>{
  const msg = document.getElementById("msgInput").value;
  if(!msg) return;

  await addDoc(collection(db,"chats",chatId,"messages"),{
    text:msg,
    sender:currentUser,
    time:Date.now()
  });

  document.getElementById("msgInput").value="";
};

// =======================
// 📞 CALL SYSTEM
// =======================

let pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

const callScreen = document.getElementById("callScreen");

function showCallUI(user){
  callScreen.style.display="block";
  document.getElementById("callUserName").innerText=user;
}

function goToChat(){
  callScreen.style.display="none";
}

function endCall(){
  callScreen.style.display="none";
  pc.close();
}

document.getElementById("callBtn").onclick = async ()=>{

  showCallUI(selectedUser);

  const stream = await navigator.mediaDevices.getUserMedia({audio:true});

  stream.getTracks().forEach(track=>pc.addTrack(track,stream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await setDoc(doc(db,"calls",chatId),{
    offer:offer,
    from:currentUser,
    to:selectedUser
  });
};

function goBack(){
  window.location.href="dashboard.html";
}

</script>

</body>
</html>
